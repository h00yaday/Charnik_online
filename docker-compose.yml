services:
  db:
    image: postgres:15-alpine
    container_name: dnd_postgres
    restart: always
    env_file:
      - .env
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:alpine
    container_name: dnd_caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

  backend:
    build:
      context: ./backend_api 
    container_name: dnd_fastapi
    restart: always
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy 
      redis:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env 
    volumes:
      - ./backend_api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend_app
    container_name: dnd_react
    restart: always
    expose:
      - "5173"
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./frontend_app:/app
      - /app/node_modules
  
  redis:
    image: redis:alpine
    container_name: dnd_redis
    restart: always
    expose:
      - "6379"
    env_file:
      - .env
    volumes:
      - redis_data:/data
    
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: dnd_rabbitmq
    restart: always
    expose:
      - "5672"
    ports:
      - "15672:15672" # Порт для веб-панели RabbitMQ (логин/пароль: guest/guest)
    env_file:
      - .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmqctl -q status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  celery_worker:
    build:
      context: ./backend_api
    container_name: dnd_celery_worker
    restart: always
    depends_on:
      rabbitmq:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    volumes:
      - ./backend_api:/app
    command: celery -A core.celery_app.celery_app worker --loglevel=info
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

volumes:
  pgdata:
  caddy_data:
  caddy_config:
  redis_data:
  rabbitmq_data: