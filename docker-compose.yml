services:
  db:
    image: postgres:15-alpine
    container_name: dnd_postgres
    restart: always
    env_file:
      - .env
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:alpine
    container_name: dnd_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
      - frontend
    restart: always

  backend:
    build:
      context: ./backend_api 
    container_name: dnd_fastapi
    restart: always
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy 
    env_file:
      - .env 
    volumes:
      - ./backend_api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend_app
    container_name: dnd_react
    restart: always
    expose:
      - "5173"
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./frontend_app:/app
      - /app/node_modules
      
volumes:
  pgdata: