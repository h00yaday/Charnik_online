services:
  db:
    image: postgres:15-alpine
    container_name: dnd_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend_api 
    container_name: dnd_fastapi
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    env_file:
      - .env 
    volumes:
      - ./backend_api:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend_app
    container_name: dnd_react
    restart: always
    ports:
      - "5173:5173"
    depends_on:
      - backend
    env_file:
      - .env
    volumes:
      - ./frontend_app:/app
      - /app/node_modules
      
volumes:
  pgdata: