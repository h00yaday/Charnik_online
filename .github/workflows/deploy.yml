name: Deploy to AWS EC2

on:
  push:
    branches:
      - main 
  workflow_dispatch:
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Install uv and ruff
        uses: astral-sh/setup-uv@v5
        
      - name: Run Ruff Linter
        run: uv run ruff check backend_api/
        
      - name: Run Ruff Formatter check
        run: uv run ruff format --check backend_api/
        
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          REPO_URL: "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SECRET_KEY: ${{ secrets.SECRET_KEY }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          # –î–æ–±–∞–≤–ª–µ–Ω—ã –Ω–æ–≤—ã–µ —Å–µ–∫—Ä–µ—Ç—ã
          ACCESS_TOKEN_EXPIRE_MINUTES: ${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}
          ALGORITHM: ${{ secrets.ALGORITHM }}
          DB_ECHO: ${{ secrets.DB_ECHO }}
          DOMAIN_NAME: ${{ secrets.DOMAIN_NAME }} 
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # –û–±—è–∑–∞—Ç–µ–ª—å–Ω–æ –¥–æ–±–∞–≤–ª—è–µ–º –∏—Ö –≤ —Å–ø–∏—Å–æ–∫ –¥–ª—è –ø–µ—Ä–µ–¥–∞—á–∏ –ø–æ SSH
          envs: REPO_URL,DOMAIN_NAME,POSTGRES_USER,POSTGRES_PASSWORD,POSTGRES_DB,DATABASE_URL,SECRET_KEY,ENVIRONMENT,ACCESS_TOKEN_EXPIRE_MINUTES,ALGORITHM,DB_ECHO
          script: |
            cd /home/ubuntu
            
            if [ ! -d "charnik_online" ]; then
              git clone $REPO_URL charnik_online
            fi
            
            cd charnik_online
            git fetch origin main
            git reset --hard origin/main
            
            # –°–æ–±–∏—Ä–∞–µ–º –ø–æ–ª–Ω—ã–π —Ñ–∞–π–ª .env
            echo "DOMAIN_NAME=$DOMAIN_NAME" > .env
            echo "POSTGRES_USER=$POSTGRES_USER" >> .env
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> .env
            echo "POSTGRES_DB=$POSTGRES_DB" >> .env
            echo "DATABASE_URL=$DATABASE_URL" >> .env
            echo "SECRET_KEY=$SECRET_KEY" >> .env
            echo "ENVIRONMENT=$ENVIRONMENT" >> .env
            echo "ACCESS_TOKEN_EXPIRE_MINUTES=$ACCESS_TOKEN_EXPIRE_MINUTES" >> .env
            echo "ALGORITHM=$ALGORITHM" >> .env
            echo "DB_ECHO=$DB_ECHO" >> .env
            
            sudo docker-compose down --remove-orphans
            sudo docker-compose up -d --build --remove-orphans