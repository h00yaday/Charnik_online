target-version = "py311"
line-length = 120
exclude = [
    ".git",
    "__pycache__",
    "migrations", 
    ".venv",
    "venv",
]

[lint]
select = [
    "E",  
    "F",  
    "I",  
    "B",  
    "UP", 
]
ignore = []

[format]
quote-style = "double"
indent-style = "space"
[lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Path",
    "fastapi.Body",
    "fastapi.Header",
    "fastapi.Cookie",
    "fastapi.Security",
]